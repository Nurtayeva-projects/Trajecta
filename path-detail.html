<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>План действий — Trajecta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script type="text/javascript">(function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};m[i].l=1*new Date();for(var j=0;j<document.scripts.length;j++){if(document.scripts[j].src===r){return;}}k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})(window,document,"script","https://mc.yandex.ru/metrika/tag.js","ym");ym(107245981,"init",{clickmap:true,trackLinks:true,accurateTrackBounce:true});</script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BMXPMT81Y5"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-BMXPMT81Y5');</script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#020617;--card:#0d1b35;--card2:#111f3a;
      --accent:#C6FF00;--ag:rgba(198,255,0,.45);--ad:rgba(198,255,0,.1);--am:rgba(198,255,0,.22);
      --blue:rgba(96,165,250,.9);--bd:rgba(96,165,250,.12);--bm:rgba(96,165,250,.22);
      --orange:rgba(255,140,60,.9);--od:rgba(255,140,60,.1);--om:rgba(255,140,60,.22);
      --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
      --text:#f0f4ff;--muted:rgba(240,244,255,.48);--dim:rgba(240,244,255,.22);
      --D:'Syne',sans-serif;--B:'Space Grotesk',sans-serif;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--B);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:rgba(198,255,0,.2);border-radius:3px}

    .bg-g{position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(198,255,0,.05) 0%,transparent 60%);}
    .bg-gr{position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:linear-gradient(rgba(198,255,0,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(198,255,0,.018) 1px,transparent 1px);
      background-size:64px 64px;
      mask-image:radial-gradient(ellipse 70% 55% at 50% 25%,black 10%,transparent 100%);
      -webkit-mask-image:radial-gradient(ellipse 70% 55% at 50% 25%,black 10%,transparent 100%);}

    header{display:flex;align-items:center;padding:0 48px;height:72px;border-bottom:1px solid var(--border);position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(2,6,23,.88);backdrop-filter:blur(20px);}
    .logo{font-family:var(--D);font-size:1.55rem;font-weight:800;color:var(--text);letter-spacing:-.02em;}
    .logo span{color:var(--accent);text-shadow:0 0 16px var(--ag);}
    .hbtns{margin-left:auto;display:flex;gap:10px;}
    .btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#020617;font-family:var(--B);font-weight:700;font-size:.9rem;padding:10px 22px;border-radius:8px;border:none;cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;white-space:nowrap;text-decoration:none;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(198,255,0,.4);}
    .btn-g{background:transparent;color:var(--muted);border:1px solid var(--border2);}
    .btn-g:hover{color:var(--text);border-color:rgba(255,255,255,.22);box-shadow:none;}

    .prog{position:fixed;top:72px;left:0;right:0;height:2px;background:rgba(255,255,255,.06);z-index:99;}
    .prog-f{height:100%;background:linear-gradient(90deg,var(--accent),#a8e000);box-shadow:0 0 8px var(--ag);width:100%;}

    .wrap{position:relative;z-index:1;}
    .page{max-width:860px;margin:0 auto;padding:108px 40px 100px;display:flex;flex-direction:column;gap:20px;}

    @keyframes fup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* HERO */
    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--ad);border:1px solid var(--am);color:var(--accent);font-size:.72rem;font-weight:600;letter-spacing:.13em;text-transform:uppercase;padding:5px 14px;border-radius:100px;margin-bottom:20px;animation:fup .5s ease both;}
    .bdot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 2s infinite;}
    .hero-title{font-family:var(--D);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;letter-spacing:-.04em;line-height:1.05;margin-bottom:10px;animation:fup .5s .1s ease both;}
    .hero-title em{font-style:normal;color:var(--accent);}
    .hero-sub{font-size:1rem;color:var(--muted);line-height:1.7;animation:fup .5s .15s ease both;}
    .hero-sub strong{color:rgba(240,244,255,.82);}

    /* PROFILE BAR */
    .profile-bar{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 22px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;animation:fup .5s .2s ease both;}
    .pb-item{}
    .pb-label{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
    .pb-val{font-family:var(--D);font-size:.9rem;font-weight:800;}
    .pb-sep{width:1px;height:32px;background:var(--border);}

    /* PATH SUMMARY CARD */
    .path-card{border-radius:18px;padding:26px 28px;position:relative;overflow:hidden;animation:fup .5s .25s ease both;}
    .path-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
    .path-a{background:linear-gradient(135deg,rgba(255,140,60,.08),rgba(255,140,60,.03));border:1.5px solid rgba(255,140,60,.3);}
    .path-a::before{background:linear-gradient(90deg,rgba(255,140,60,.9),transparent 70%);}
    .path-b{background:linear-gradient(135deg,rgba(96,165,250,.08),rgba(96,165,250,.03));border:1.5px solid rgba(96,165,250,.3);}
    .path-b::before{background:linear-gradient(90deg,rgba(96,165,250,.9),transparent 70%);}
    .path-card-label{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
    .path-a .path-card-label{color:rgba(255,140,60,.85);}
    .path-b .path-card-label{color:rgba(96,165,250,.85);}
    .path-card-name{font-family:var(--D);font-size:1.3rem;font-weight:800;letter-spacing:-.025em;margin-bottom:8px;}
    .path-card-desc{font-size:.9rem;color:var(--muted);line-height:1.65;margin-bottom:16px;}
    .path-metrics{display:flex;gap:16px;flex-wrap:wrap;}
    .pm{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
    .pm-lbl{font-size:.64rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
    .pm-val{font-family:var(--D);font-size:.95rem;font-weight:800;}
    .path-a .pm-val{color:rgba(255,140,60,.9);}
    .path-b .pm-val{color:var(--blue);}

    /* CARD */
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:26px 28px;position:relative;}
    .card.accent-top::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent 60%);border-radius:18px 18px 0 0;}
    .ch{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .ci{font-size:1.1rem;}
    .ct{font-family:var(--D);font-size:.76rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}

    /* FIRST 90 DAYS */
    .days-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .day-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:16px 14px;}
    .day-num{font-family:var(--D);font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
    .day-title{font-size:.88rem;font-weight:600;margin-bottom:6px;}
    .day-desc{font-size:.8rem;color:var(--muted);line-height:1.6;}

    /* STEPS */
    .steps-list{display:flex;flex-direction:column;gap:0;}
    .step-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--border);position:relative;}
    .step-item:last-child{border-bottom:none;}
    .step-item::before{content:'';position:absolute;left:15px;top:40px;bottom:-16px;width:1px;background:var(--border);}
    .step-item:last-child::before{display:none;}
    .step-num{width:30px;height:30px;border-radius:50%;background:var(--ad);border:1px solid var(--am);display:flex;align-items:center;justify-content:center;font-family:var(--D);font-size:.72rem;font-weight:800;color:var(--accent);flex-shrink:0;margin-top:2px;}
    .step-body{flex:1;}
    .step-period{font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .step-title{font-family:var(--D);font-size:1rem;font-weight:800;margin-bottom:5px;letter-spacing:-.015em;}
    .step-desc{font-size:.85rem;color:var(--muted);line-height:1.6;}
    .step-income{margin-top:8px;display:inline-flex;align-items:center;gap:5px;background:var(--ad);border:1px solid var(--am);color:var(--accent);font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:100px;}

    /* SKILLS NEEDED */
    .skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .skill-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:13px 14px;display:flex;align-items:flex-start;gap:10px;}
    .skill-ico{font-size:1.1rem;flex-shrink:0;margin-top:1px;}
    .skill-name{font-size:.85rem;font-weight:600;margin-bottom:3px;}
    .skill-how{font-size:.76rem;color:var(--muted);line-height:1.5;}
    .skill-time{font-size:.68rem;font-weight:700;color:var(--accent);margin-top:4px;}

    /* RISKS */
    .risks-list{display:flex;flex-direction:column;gap:10px;}
    .risk-item{background:rgba(255,80,50,.04);border:1px solid rgba(255,80,50,.15);border-radius:10px;padding:13px 16px;display:flex;align-items:flex-start;gap:12px;}
    .risk-ico{font-size:1rem;flex-shrink:0;margin-top:1px;}
    .risk-title{font-size:.85rem;font-weight:600;margin-bottom:3px;}
    .risk-how{font-size:.78rem;color:var(--muted);line-height:1.5;}
    .risk-how strong{color:rgba(240,244,255,.75);}

    /* RESOURCES */
    .resources-list{display:flex;flex-direction:column;gap:8px;}
    .res-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:11px 14px;}
    .res-tag{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:100px;flex-shrink:0;}
    .rt-free{background:rgba(198,255,0,.1);color:var(--accent);border:1px solid var(--am);}
    .rt-paid{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid var(--bm);}
    .rt-community{background:rgba(167,139,250,.1);color:rgba(167,139,250,.9);border:1px solid rgba(167,139,250,.22);}
    .res-name{font-size:.85rem;font-weight:600;}
    .res-desc{font-size:.75rem;color:var(--muted);margin-left:auto;}

    /* SALARY TIMELINE */
    .salary-timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--border);border-radius:14px;overflow:hidden;}
    .st-cell{background:var(--card2);padding:16px 14px;text-align:center;}
    .st-period{font-size:.64rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
    .st-val{font-family:var(--D);font-size:.9rem;font-weight:800;color:var(--accent);letter-spacing:-.01em;line-height:1.2;}
    .st-note{font-size:.68rem;color:var(--muted);margin-top:4px;}

    /* CTA */
    .cta-block{background:linear-gradient(135deg,rgba(198,255,0,.09),rgba(198,255,0,.03));border:1.5px solid rgba(198,255,0,.25);border-radius:18px;padding:28px 32px;text-align:center;position:relative;overflow:hidden;}
    .cta-block::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent 70%);}
    .cta-title{font-family:var(--D);font-size:1.3rem;font-weight:800;letter-spacing:-.025em;margin-bottom:8px;}
    .cta-title em{font-style:normal;color:var(--accent);}
    .cta-sub{font-size:.9rem;color:var(--muted);line-height:1.65;margin-bottom:20px;}
    .cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}


    /* ── АНИМАЦИИ path-detail.html ── */
    @keyframes fup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideInLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
    @keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

    /* Hero */
    .hero-badge{animation:fup .4s ease both;}
    .hero-title{animation:fup .5s .1s ease both;}
    .hero-sub{animation:fup .5s .15s ease both;}
    .profile-bar{animation:fup .5s .2s ease both;}
    .path-card{animation:popIn .5s .25s cubic-bezier(.34,1.2,.64,1) both;}

    /* Salary timeline cells */
    .st-cell{transition:background .2s;}
    .st-cell:hover{background:rgba(255,255,255,.06);}
    .st-val{transition:color .3s;}

    /* 90 days cards stagger */
    .day-card{opacity:0;transform:translateY(16px);animation:fup .4s ease forwards;}
    .day-card:nth-child(1){animation-delay:.3s}
    .day-card:nth-child(2){animation-delay:.4s}
    .day-card:nth-child(3){animation-delay:.5s}
    .day-card:nth-child(4){animation-delay:.6s}
    .day-card:hover{border-color:var(--border2);transform:translateY(-2px);}

    /* Roadmap steps slide in */
    .step-item{opacity:0;transform:translateX(-16px);animation:slideInLeft .4s ease forwards;}
    .step-item:nth-child(1){animation-delay:.4s}
    .step-item:nth-child(2){animation-delay:.52s}
    .step-item:nth-child(3){animation-delay:.64s}
    .step-item:nth-child(4){animation-delay:.76s}
    .step-item:nth-child(5){animation-delay:.88s}

    /* Skills hover */
    .skill-item{transition:all .2s;}
    .skill-item:hover{border-color:var(--border2);transform:translateY(-2px);}
    .skill-ico{transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
    .skill-item:hover .skill-ico{transform:scale(1.3);}

    /* Risk items */
    .risk-item{transition:all .2s;}
    .risk-item:hover{border-color:rgba(255,80,50,.3);transform:translateX(4px);}

    /* Resources */
    .res-item{transition:all .2s;}
    .res-item:hover{background:rgba(255,255,255,.05);border-color:var(--border2);transform:translateX(3px);}

    /* CTA button pulse */
    @keyframes ctaPulse{0%,100%{box-shadow:0 8px 28px rgba(198,255,0,.35)}50%{box-shadow:0 8px 40px rgba(198,255,0,.6)}}
    .cta-block .btn{animation:ctaPulse 2.5s ease-in-out infinite;}
    .cta-block .btn:hover{animation:none;}

    @media(max-width:640px){
      header{padding:0 20px;}
      .page{padding:92px 16px 80px;gap:14px;}
      .hbtns .btn-g{display:none;}
      .card{padding:20px 16px;}
      .days-grid{grid-template-columns:1fr;}
      .skills-grid{grid-template-columns:1fr;}
      .salary-timeline{grid-template-columns:repeat(2,1fr);}
      .profile-bar{gap:12px;}
      .pb-sep{display:none;}
      .path-metrics{gap:10px;}
    }
  </style>
</head>
<body>

<div class="bg-g"></div>
<div class="bg-gr"></div>

<header>
  <a href="index.html" class="logo">Traject<span>a</span></a>
  <div class="hbtns">
    <a href="paths.html" class="btn btn-g" style="font-size:.82rem;padding:8px 16px">← Сменить стратегию</a>
    <a href="result.html" class="btn btn-g" style="font-size:.82rem;padding:8px 16px">К результату</a>
  </div>
</header>
<div class="prog"><div class="prog-f"></div></div>

<div class="wrap">
<div class="page" id="page">
  <div style="text-align:center;padding:60px 0;color:var(--muted)">Загрузка плана...</div>
</div>
</div>

<script>
  function save(k,v){try{localStorage.setItem('tr_'+k,JSON.stringify(v));}catch(e){}}
  function load(k){try{return JSON.parse(localStorage.getItem('tr_'+k));}catch(e){return null;}}

  const R    = load('result');
  const SEL  = load('selected_path') || 'a';

  if(!R){
    document.getElementById('page').innerHTML=`
      <div style="text-align:center;padding:80px 20px">
        <div style="font-size:3rem;margin-bottom:16px">🔍</div>
        <h2 style="font-family:var(--D);font-size:1.8rem;margin-bottom:12px">Нет данных</h2>
        <p style="color:var(--muted);margin-bottom:28px">Пройди симуляцию сначала</p>
        <a href="choose.html" class="btn">Запустить →</a>
      </div>`;
  } else {
    init();
  }

  function init(){
    const prof = R.prof || 'other';
    const sc   = R.sc   || 'switch';
    const gt   = R.growthType || 'stable';
    const inc  = R.income || {};
    const prob = R.prob  || 72;
    const path = SEL;

    const pathData   = getPathDetail(prof, sc, path);
    const days90     = get90Days(prof, sc, path);
    const roadmap    = getRoadmap(sc, inc, path);
    const skills     = getSkills(prof, sc, path);
    const risks      = getRisks(sc, path);
    const resources  = getResources(prof, sc);
    const salaryLine = getSalaryLine(inc);

    const SCLABEL = {switch:'Смена профессии', grow:'Рост дохода', restart:'Перезапуск'};
    const PLABEL  = {law:'Юрист',finance:'Финансист',it:'IT-специалист',marketing:'Маркетолог',design:'Дизайнер',medicine:'Медик',hr:'HR',education:'Педагог',sales:'Продажник',engineering:'Инженер',creative:'Творческая сфера',other:'Специалист'};
    const profLabel = R.ans?.profLabel || PLABEL[prof] || 'Специалист';
    const isA = path === 'a';

    document.title = `${pathData.name} — Trajecta`;

    document.getElementById('page').innerHTML = `

      <!-- HERO -->
      <div class="hero-badge"><span class="bdot"></span>Персональный план действий</div>
      <h1 class="hero-title">Стратегия <em>${isA ? 'А' : 'Б'}</em> — ${pathData.name}</h1>
      <p class="hero-sub">Персональный план для <strong>${profLabel}</strong> · сценарий «${SCLABEL[sc]}» · на основе 8 параметров твоего профиля.</p>

      <!-- PROFILE BAR -->
      <div class="profile-bar">
        <div class="pb-item"><div class="pb-label">Профессия</div><div class="pb-val">${profLabel}</div></div>
        <div class="pb-sep"></div>
        <div class="pb-item"><div class="pb-label">Сценарий</div><div class="pb-val">${SCLABEL[sc]}</div></div>
        <div class="pb-sep"></div>
        <div class="pb-item"><div class="pb-label">Стратегия</div><div class="pb-val" style="color:${isA?'rgba(255,140,60,.9)':'var(--blue)'}">${isA?'А · Влияние':'Б · Управление'}</div></div>
        <div class="pb-sep"></div>
        <div class="pb-item"><div class="pb-label">Целевой доход</div><div class="pb-val" style="color:var(--accent)">${inc.y2||'—'}</div></div>
      </div>

      <!-- PATH SUMMARY -->
      <div class="path-card ${isA?'path-a':'path-b'}">
        <div class="path-card-label">Стратегия ${isA?'А':'Б'} · ${pathData.type}</div>
        <div class="path-card-name">${pathData.name}</div>
        <p class="path-card-desc">${pathData.desc}</p>
        <div class="path-metrics">
          <div class="pm"><div class="pm-lbl">Доход через 2 года</div><div class="pm-val">${pathData.salary}</div></div>
          <div class="pm"><div class="pm-lbl">Срок до результата</div><div class="pm-val">${pathData.time}</div></div>
          <div class="pm"><div class="pm-lbl">Вероятность успеха</div><div class="pm-val">${pathData.prob}%</div></div>
        </div>
      </div>

      <!-- SALARY TIMELINE -->
      <div class="card accent-top">
        <div class="ch"><span class="ci">💰</span><span class="ct">Траектория дохода по этой стратегии</span></div>
        <div class="salary-timeline">
          ${salaryLine.map(s=>`
          <div class="st-cell">
            <div class="st-period">${s.period}</div>
            <div class="st-val">${s.val}</div>
            <div class="st-note">${s.note}</div>
          </div>`).join('')}
        </div>
      </div>

      <!-- 90 DAYS PLAN -->
      <div class="card">

        ],
      },
    };
    const sc2 = sc||'switch';
    return (RISKS[sc2]?.[isA?'a':'b']) || RISKS.switch.a;
  }

    const BASE = [

    const EXTRA = {
      it:[
        {type:'free',name:'LeetCode / HackerRank',desc:'Подготовка к техническим собеседованиям'},
        {type:'free',name:'GitHub',               desc:'Портфолио и open source проекты'},
        {type:'paid',name:'Reforge',              desc:'Product management курсы высшего уровня'},

      law:[
        {type:'free',name:'Egov.kz',             desc:'Законодательство РК'},
        {type:'community',name:'Юридические телеграм-каналы КЗ',desc:'Сообщество юристов'},
      ],
      marketing:[
        {type:'free',name:'Google Skillshop',    desc:'Бесплатные сертификаты Google'},
        {type:'free',name:'Meta Blueprint',      desc:'Сертификаты Facebook/Instagram Ads'},

      finance:[
        {type:'paid',name:'CFA Institute',       desc:'Сертификация CFA — мировой стандарт'},

  function getSalaryLine(inc){
    return [
      {period:'Старт',     val: inc.now  || '—', note:'Точка входа'},
      {period:'6 мес.',    val: inc.now  || '—', note:'Адаптация'},
      {period:'2 года',    val: inc.y2   || '—', note:'Целевой уровень'},
      {period:'5 лет',     val: inc.y5   || '—', note:'При стратегии'},
    ];
  }

  function shareResult(){
    const text = `Я выбрал стратегию развития на Trajecta!\nДоход через 2 года: ${R.income?.y2||'—'}\nhttps://nurtayeva-projects.github.io/Trajecta/`;
    if(navigator.share){ navigator.share({title:'Мой план на Trajecta',text}); }
    else if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(()=>{
        const b = document.querySelector('.cta-btns .btn:last-child');
        if(b){ const o=b.textContent; b.textContent='✓ Скопировано!'; setTimeout(()=>b.textContent=o,2000); }
      });
    }
  }
