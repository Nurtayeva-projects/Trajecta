<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройка сценария — FutureSim</title>
  <link rel="stylesheet" href="style.css">
  <script type="text/javascript">(function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};m[i].l=1*new Date();for(var j=0;j<document.scripts.length;j++){if(document.scripts[j].src===r){return;}}k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})(window,document,"script","https://mc.yandex.ru/metrika/tag.js","ym");ym(107245981,"init",{clickmap:true,trackLinks:true,accurateTrackBounce:true});</script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BMXPMT81Y5"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-BMXPMT81Y5');</script>
  <style>
    main { min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:100px 24px 60px; }

    /* SCENARIO BADGE */
    .scenario-badge {
      display:inline-flex;align-items:center;gap:8px;
      background:var(--card);border:1px solid var(--border);
      border-radius:100px;padding:8px 18px;
      font-size:0.82rem;color:var(--text-muted);
      margin-bottom:32px;
    }
    .scenario-badge strong { color:var(--text);font-weight:600; }

    /* Q HEADER */
    .q-top { width:100%;max-width:680px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px; }
    .q-counter { font-size:0.76rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em; }
    .q-timer { display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-muted); }
    .timer-dot { width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 1.5s infinite; }

    /* Q DOTS */
    .q-dots { display:flex;gap:5px;margin-bottom:20px; }
    .q-dot { width:28px;height:4px;border-radius:2px;background:var(--border);transition:all 0.4s ease; }
    .q-dot.done { background:rgba(198,255,0,0.4); }
    .q-dot.active { background:var(--accent);box-shadow:0 0 8px var(--accent-glow); }

    /* Q CARD */
    .q-card {
      width:100%;max-width:680px;
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius-lg);padding:40px 40px 32px;
      position:relative;overflow:hidden;
      animation:slideIn 0.45s cubic-bezier(0.34,1.2,0.64,1) both;
    }
    .q-card::before { content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent 60%); }
    @keyframes slideIn { from{opacity:0;transform:translateX(36px) scale(0.97)} to{opacity:1;transform:translateX(0) scale(1)} }
    @keyframes slideOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-36px)} }

    .q-num-bg { position:absolute;top:24px;right:32px;font-family:var(--font-display);font-size:4rem;font-weight:800;color:rgba(198,255,0,0.05);line-height:1;pointer-events:none; }
    .q-tag { display:inline-flex;align-items:center;gap:6px;background:var(--accent-dim);border:1px solid var(--accent-mid);color:var(--accent);font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 12px;border-radius:100px;margin-bottom:18px; }
    .q-text { font-family:var(--font-display);font-size:clamp(1.3rem,3vw,1.7rem);font-weight:800;line-height:1.2;letter-spacing:-0.025em;margin-bottom:28px;padding-right:60px; }

    /* OPTIONS */
    .options { display:flex;flex-direction:column;gap:10px; }
    .option {
      display:flex;align-items:flex-start;gap:14px;
      background:rgba(255,255,255,0.03);border:1.5px solid var(--border);
      border-radius:var(--radius-sm);padding:16px 18px;
      cursor:pointer;transition:all 0.2s;
      text-align:left;width:100%;font-family:var(--font-body);
    }
    .option:hover { border-color:rgba(255,255,255,0.18);background:rgba(255,255,255,0.05);transform:translateY(-1px); }
    .opt-key { width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:0.82rem;flex-shrink:0;transition:all 0.2s; }
    .opt-body { flex:1; }
    .opt-val { font-size:0.68rem;font-weight:700;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;transition:color 0.2s; }
    .opt-text { font-size:0.93rem;line-height:1.55;color:var(--text-muted);transition:color 0.2s; }
    .opt-check { width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.65rem;flex-shrink:0;margin-top:5px;transition:all 0.2s;color:transparent; }

    /* selected states: A=blue, B=green */
    .option.sel-a { border-color:rgba(96,165,250,0.45);background:rgba(96,165,250,0.07); }
    .option.sel-a .opt-key { background:rgba(96,165,250,0.2);color:rgba(96,165,250,1); }
    .option.sel-a .opt-val { color:rgba(96,165,250,0.7); }
    .option.sel-a .opt-text { color:var(--text); }
    .option.sel-a .opt-check { border-color:rgba(96,165,250,0.6);background:rgba(96,165,250,0.15);color:rgba(96,165,250,1); }

    .option.sel-b { border-color:rgba(198,255,0,0.4);background:var(--accent-dim); }
    .option.sel-b .opt-key { background:rgba(198,255,0,0.18);color:var(--accent); }
    .option.sel-b .opt-val { color:rgba(198,255,0,0.7); }
    .option.sel-b .opt-text { color:var(--text); }
    .option.sel-b .opt-check { border-color:var(--accent);background:rgba(198,255,0,0.15);color:var(--accent); }

    /* HINT */
    .answer-hint { font-size:0.78rem;color:rgba(255,100,100,0.7);text-align:center;min-height:20px;margin-top:10px;opacity:0;transition:opacity 0.3s; }
    .answer-hint.show { opacity:1; }

    /* NAV */
    .q-nav { width:100%;max-width:680px;display:flex;gap:10px;margin-top:14px;align-items:center; }
    .btn-back { width:52px;height:52px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s; }
    .btn-back:hover:not(:disabled) { border-color:rgba(255,255,255,0.2);color:var(--text); }
    .btn-back:disabled { opacity:0.25;cursor:not-allowed; }
    .btn-next { flex:1;height:52px;background:var(--accent);color:#020617;font-family:var(--font-body);font-weight:700;font-size:0.975rem;border:none;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s; }
    .btn-next:hover { transform:translateY(-3px);box-shadow:0 10px 32px rgba(198,255,0,0.4); }

    @media(max-width:600px){ main{padding:92px 16px 48px;} .q-card{padding:28px 20px 24px;} .q-text{font-size:1.2rem;padding-right:40px;} .q-num-bg{font-size:3rem;} }
  </style>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="logo">Future<span>Sim</span></a>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text-muted)">
    <span class="timer-dot"></span>
    <span id="timerDisplay">0:00</span>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:50%"></div></div>
<div class="step-dots"></div>

<main>

  <div class="scenario-badge" id="scenarioBadge">
    <span>⚙️</span> Настройка модели: <strong id="scenarioLabel">Смена профессии</strong>
  </div>

  <div class="q-top" style="width:100%;max-width:680px">
    <div class="q-counter">Параметр <span id="qNum">1</span> из 7</div>
    <div class="q-dots" id="qDots"></div>
  </div>

  <div id="qWrap" style="width:100%;max-width:680px"></div>

  <p class="answer-hint" id="hint">👆 Выбери один из вариантов</p>

  <div class="q-nav">
    <button class="btn-back" id="btnBack" onclick="prev()" disabled>←</button>
    <button class="btn-next" id="btnNext" onclick="next()">Следующий параметр →</button>
  </div>

</main>

<script src="script.js"></script>
<script>
// ── QUESTIONS ──
const QS = [
  {
    tag:'⚡ Риск',
    text:'Как ты относишься к риску при принятии важных решений?',
    a:{ val:'low',   label:'Осторожный',   text:'Предпочитаю минимизировать риски. Надёжность и предсказуемость для меня важнее потенциально высокого результата.' },
    b:{ val:'medium',label:'Взвешенный',   text:'Готов на обдуманный риск, если вижу реальный потенциал. Анализирую прежде чем действовать.' },
    c:{ val:'high',  label:'Агрессивный',  text:'Высокий риск — норма. Без риска нет роста. Готов принять потерю ради значительного выигрыша.' },
    key:'risk', type:'triple'
  },
  {
    tag:'⚡ Скорость',
    text:'Как быстро ты принимаешь важные решения?',
    a:{ val:'slow',  label:'Методично',    text:'Тщательно анализирую все варианты, собираю данные. Лучше подольше, но наверняка.' },
    b:{ val:'medium',label:'Ситуативно',   text:'Зависит от ситуации. Могу действовать быстро, если уверен, и медленно — при неопределённости.' },
    c:{ val:'fast',  label:'Интуитивно',   text:'Доверяю интуиции. Быстрые решения — мой стиль. Промедление хуже, чем ошибка.' },
    key:'speed', type:'triple'
  },
  {
    tag:'🎯 Приоритет',
    text:'Что для тебя главное в работе и карьере?',
    a:{ val:'money',    label:'Деньги',       text:'Высокий доход — главный показатель успеха. Финансовая независимость открывает все остальные возможности.' },
    b:{ val:'stability',label:'Стабильность', text:'Надёжность и предсказуемость важнее максимального дохода. Спокойствие — это тоже ценность.' },
    c:{ val:'interest', label:'Интерес',      text:'Хочу заниматься тем, что по-настоящему увлекает. Деньги важны, но смысл — важнее.' },
    key:'priority', type:'triple'
  },
  {
    tag:'📅 Горизонт',
    text:'На какой срок ты обычно планируешь своё развитие?',
    a:{ val:'short', label:'До 1 года',    text:'Мыслю конкретными ближайшими шагами. Долгосрочные планы кажутся абстрактными — лучше фокус на сейчас.' },
    b:{ val:'mid',   label:'1–3 года',     text:'Строю планы на 1–3 года. Достаточный горизонт, чтобы видеть прогресс и корректировать курс.' },
    c:{ val:'long',  label:'3–5+ лет',     text:'Думаю стратегически. Готов к долгой дороге ради значимого результата через несколько лет.' },
    key:'horizon', type:'triple'
  },
  {
    tag:'💪 Навыки',
    text:'Как ты оцениваешь свой текущий уровень навыков в желаемой области?',
    a:{ val:'low',   label:'Начинающий',   text:'Я новичок в этой области. Многому ещё предстоит учиться с нуля.' },
    b:{ val:'medium',label:'Базовый',      text:'Есть основы и понимание сферы, но экспертизы пока недостаточно.' },
    c:{ val:'high',  label:'Экспертный',   text:'Обладаю глубокими знаниями и опытом. Мой скилл-сет уже является конкурентным преимуществом.' },
    key:'skills', type:'triple'
  },
  {
    tag:'🌱 Мотивация',
    text:'Что сейчас движет тобой сильнее всего?',
    a:{ val:'money',   label:'Финансовая свобода', text:'Хочу достичь уровня дохода, который даст полную финансовую независимость и возможность выбора.' },
    b:{ val:'interest',label:'Самореализация',     text:'Хочу наконец заниматься тем, что по-настоящему моё — применять свои сильные стороны в полную силу.' },
    c:{ val:'stability',label:'Уверенность',       text:'Хочу стабильности и уверенности в завтрашнем дне. Предсказуемость важнее больших скачков.' },
    key:'motivation', type:'triple'
  },
  {
    tag:'🚀 Путь',
    text:'Какой путь развития тебе ближе?',
    a:{ val:'influence',label:'Путь влияния',   text:'Предпринимательство, создание своего продукта, маркетинг — хочу влиять на рынок и строить что-то своё.' },
    b:{ val:'management',label:'Путь управления',text:'Менеджмент, развитие команд, операционное лидерство — хочу строить системы и управлять людьми.' },
    c:{ val:'expert',   label:'Путь эксперта',  text:'Глубокая экспертиза в узкой теме, консалтинг, исследования — хочу быть лучшим в своём деле.' },
    key:'path', type:'triple'
  },
];

// ── STATE ──
let current = 0;
let answers = {};
let timerSec = 0;
const timerInt = setInterval(() => {
  timerSec++;
  const m = Math.floor(timerSec/60), s = timerSec%60;
  const el = document.getElementById('timerDisplay');
  if (el) el.textContent = m + ':' + String(s).padStart(2,'0');
}, 1000);

// ── SCENARIO LABEL ──
const LABELS = { switch:'Смена профессии', grow:'Рост дохода', restart:'Перезапуск' };
const scenario = FS.get('scenario');
if (!scenario) { window.location.href = 'choose.html'; }
const scenEl = document.getElementById('scenarioLabel');
if (scenEl) scenEl.textContent = LABELS[scenario] || 'Смена профессии';

// ── STEP DOTS ──
setStepDots(1, 3);

// ── INIT DOTS ──
const dotsWrap = document.getElementById('qDots');
for (let i = 0; i < 7; i++) {
  const d = document.createElement('div');
  d.className = 'q-dot'; d.id = 'qd'+i;
  dotsWrap.appendChild(d);
}

// ── RENDER ──
function render(dir=1) {
  const wrap = document.getElementById('qWrap');
  const old = wrap.querySelector('.q-card');
  if (old) {
    old.style.animation = 'slideOut 0.25s ease forwards';
    setTimeout(() => { wrap.innerHTML = buildCard(); bindOpts(); }, 240);
  } else {
    wrap.innerHTML = buildCard(); bindOpts();
  }

  document.getElementById('qNum').textContent = current+1;

  for (let i=0;i<7;i++) {
    const d=document.getElementById('qd'+i);
    if(!d) continue;
    d.className='q-dot'+(i<current?' done':i===current?' active':'');
  }

  const pct = 50 + Math.round((current/7)*20);
  document.getElementById('progressFill').style.width = pct+'%';

  document.getElementById('btnBack').disabled = current===0;
  document.getElementById('btnNext').textContent = current===6 ? 'Рассчитать прогноз →' : 'Следующий параметр →';
  document.getElementById('hint').classList.remove('show');
}

function buildCard() {
  const q = QS[current];
  const sel = answers[q.key];
  const opts = [
    { letter:'A', val:q.a.val, label:q.a.label, text:q.a.text, cls: sel===q.a.val?'sel-a':'' },
    { letter:'B', val:q.b.val, label:q.b.label, text:q.b.text, cls: sel===q.b.val?'sel-b':'' },
    { letter:'C', val:q.c.val, label:q.c.label, text:q.c.text, cls: sel===q.c.val?'sel-c':'' },
  ];
  return `
    <div class="q-card">
      <div class="q-num-bg">0${current+1}</div>
      <div class="q-tag">${q.tag}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${opts.map((o,i) => `
        <button class="option${o.cls ? ' '+o.cls : ''}" id="opt${o.letter}" onclick="pick('${q.key}','${o.val}','${o.letter}')">
          <div class="opt-key">${o.letter}</div>
          <div class="opt-body">
            <div class="opt-val">${o.label}</div>
            <div class="opt-text">${o.text}</div>
          </div>
          <div class="opt-check">${o.cls?'✓':''}</div>
        </button>`).join('')}
      </div>
    </div>`;
}

function bindOpts() {} // onclick inline

function pick(key, val, letter) {
  answers[key] = val;
  const q = QS[current];
  const letterMap = { [q.a.val]:'A', [q.b.val]:'B', [q.c.val]:'C' };

  ['A','B','C'].forEach(l => {
    const el = document.getElementById('opt'+l);
    if (!el) return;
    el.className = 'option';
    el.querySelector('.opt-check').textContent = '';
  });

  const el = document.getElementById('opt'+letter);
  if (el) {
    const cls = letter==='A'?'sel-a':letter==='B'?'sel-b':'sel-c';
    el.className = 'option '+cls;
    el.querySelector('.opt-check').textContent = '✓';
  }

  document.getElementById('hint').classList.remove('show');

  // Auto-advance on mobile
  if (window.innerWidth <= 600) setTimeout(() => { if(answers[QS[current].key]) next(); }, 500);
}

function next() {
  if (!answers[QS[current].key]) {
    document.getElementById('hint').classList.add('show');
    shakeCard(); return;
  }
  if (current === 6) { finish(); return; }
  current++; render(1);
}

function prev() {
  if (current===0) return; current--; render(-1);
}

function shakeCard() {
  const c = document.querySelector('.q-card'); if(!c) return;
  const moves=[-7,7,-5,5,-2,2,0]; let i=0;
  c.style.transition='transform 0.07s ease';
  const t = setInterval(()=>{
    c.style.transform=`translateX(${moves[i]}px)`;i++;
    if(i>=moves.length){clearInterval(t);c.style.transform='';}
  },70);
}

function finish() {
  clearInterval(timerInt);
  // Add extra fields from question 6 (motivation) and 7 (path)
  if (answers.motivation && !answers.priority) answers.priority = answers.motivation;

  const result = ForecastEngine.calculate(scenario, answers);
  FS.set('answers', answers);
  FS.set('result', result);

  document.querySelector('main').style.cssText='opacity:0;transform:scale(0.97);transition:opacity 0.4s,transform 0.4s';
  setTimeout(() => { window.location.href = 'result.html'; }, 400);
}

// init
render(1);
</script>

<style>
/* C option — purple */
.option.sel-c { border-color:rgba(167,139,250,0.4);background:rgba(167,139,250,0.08); }
.option.sel-c .opt-key { background:rgba(167,139,250,0.2);color:rgba(167,139,250,1); }
.option.sel-c .opt-val { color:rgba(167,139,250,0.7); }
.option.sel-c .opt-text { color:var(--text); }
.option.sel-c .opt-check { border-color:rgba(167,139,250,0.7);background:rgba(167,139,250,0.15);color:rgba(167,139,250,1); }
</style>
</body>
</html>
